{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'flights/css/managebooking.css' %}">
    

</head>
<body>
    {% if error %}
        <script>
            alert("{{ error }}");
        </script>
        {% endif %}
    <div class="firstcol">
        <div class="airport-pic-container">
            <h1>{{ a_code }}</h1>
            <img src="{% static 'flights/images/'|add:a_code|add:'.jpg'|lower %}" alt="Photo of {{ a_code }} Airport" class="img">
        </div>
    </div>
    
    <div class="container">
        <h1 class="text">{{ info.origin }} to {{ info.destination }}</h1>
        <h3 class="text">Duration: {{info.duration}}min | Available seats:{{ length }}</h3>
        <form method="post">
            {% csrf_token %}
            <div>
                <label>Name:</label>
                <input type="text" name="name" required placeholder="Your full name">
                <br>
                <label>Email:</label>
                <input type="text" name="email" required placeholder="Your email">
            </div>
            <br>
            <div class = "btn-center">
                {% if  length > 0 %}
                    <button class="btn" type="submit">Book</button>
                {% else %}
                    <button type="button" class="btn" >No Seats Available
                    </button>
                {%  endif %}
            </div>
            <br>
            <button type="button" class="btn"><a href="{% url 'details' info.id %}">Back to Details</a></button>
        </form>
    </div>

    <div class="firstcol">
        <div class="airport-pic-container">
            <h1>{{ d_code }}</h1>
            <img src="{% static 'flights/images/'|add:d_code|add:'.jpg'|lower %}" alt="Photo of {{ d_code }} Airport" class="img">
        </div>
    </div>
</body>
</html>
